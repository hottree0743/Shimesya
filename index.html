<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大島紬 締め者管理アプリ</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ユーティリティ: 日曜日を除外して日付を加算 ---
        const addWorkDays = (startDate, daysToAdd) => {
            let date = new Date(startDate);
            let addedDays = 0;
            while (addedDays < daysToAdd) {
                date.setDate(date.getDate() + 1);
                if (date.getDay() !== 0) addedDays++; // 0は日曜日
            }
            return date.toISOString().split('T')[0];
        };

        function App() {
            const [tab, setTab] = useState('進行');
            const [records, setRecords] = useState([]);
            
            // 入力用ステート
            const [formData, setFormData] = useState({
                gara_ban: '', gara_type: '○大島', gara_name: '', itobetsu: '絣緯',
                shinasu: '', sagari: '', maruki: '', shime_name: '',
                itowatashi_date: new Date().toISOString().split('T')[0],
                completion_date: '', wage: '', nuki_score: 3, hosu_score: 3, maisu_score: 3, note: ''
            });

            useEffect(() => {
                const saved = localStorage.getItem('oshimatsumugi-data');
                if (saved) setRecords(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('oshimatsumugi-data', JSON.stringify(records));
            }, [records]);

            // --- 難易度算出ロジック ---
            const getDifficulty = (r) => {
                const score = Number(r.nuki_score) + Number(r.hosu_score) + Number(r.maisu_score);
                if (score <= 6) return { label: '低', color: 'bg-green-500' };
                if (score <= 11) return { label: '中', color: 'bg-yellow-500' };
                return { label: '高', color: 'bg-red-500' };
            };

            // --- 予定日算出ロジック ---
            const calculateScheduledDate = (shimeName, itobetsu, startDate) => {
                const pastData = records.filter(r => r.shime_name === shimeName && r.itobetsu === itobetsu && r.completion_date);
                let avgDays = 7; // デフォルトは1週間
                if (pastData.length > 0) {
                    const totalDays = pastData.reduce((sum, r) => {
                        const start = new Date(r.itowatashi_date);
                        const end = new Date(r.completion_date);
                        return sum + (end - start) / (1000 * 60 * 60 * 24);
                    }, 0);
                    avgDays = Math.round(totalDays / pastData.length);
                }
                return addWorkDays(startDate, avgDays);
            };

            const handleSave = () => {
                if (!formData.shime_name || !formData.gara_name) return alert("必須項目を入力してください");
                const difficultyData = getDifficulty(formData);
                const newRecord = {
                    ...formData,
                    id: Date.now(),
                    difficulty: difficultyData.label,
                    difficultyColor: difficultyData.color,
                    scheduled_date: calculateScheduledDate(formData.shime_name, formData.itobetsu, formData.itowatashi_date)
                };
                setRecords([newRecord, ...records]);
                alert("保存しました");
                setTab('進行');
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-2xl flex flex-col">
                    <header className="bg-indigo-900 text-white p-4 text-center">
                        <h1 className="text-lg font-bold">大島紬 締め者管理システム</h1>
                    </header>

                    {/* タブメニュー */}
                    <nav className="flex bg-indigo-50 text-[10px] sm:text-xs font-bold border-b border-indigo-100">
                        {['進行', '管理', '履歴', '工賃計算'].map(t => (
                            <button key={t} onClick={() => setTab(t)}
                                className={`flex-1 py-4 transition-colors ${tab === t ? 'bg-white text-indigo-700 border-b-2 border-indigo-700' : 'text-gray-500'}`}>
                                {t}
                            </button>
                        ))}
                    </nav>

                    <main className="flex-1 p-4 overflow-y-auto pb-10">
                        {/* ① 進行タブ */}
                        {tab === '進行' && (
                            <div className="space-y-4">
                                <h2 className="text-gray-500 text-sm font-bold border-l-4 border-indigo-500 pl-2">現在進行中の柄（最大4件）</h2>
                                {records.filter(r => !r.completion_date).slice(0, 4).map(r => (
                                    <div key={r.id} className="bg-white border rounded-xl p-4 shadow-sm relative overflow-hidden">
                                        <div className={`absolute top-0 right-0 px-3 py-1 text-white text-[10px] ${r.difficultyColor}`}>
                                            難易度:{r.difficulty}
                                        </div>
                                        <div className="text-lg font-bold text-gray-800">{r.shime_name} <span className="text-sm font-normal text-gray-500">さん</span></div>
                                        <div className="mt-2 text-sm space-y-1">
                                            <p><span className="text-gray-400">柄名:</span> {r.gara_name}</p>
                                            <p><span className="text-gray-400">種類:</span> {r.itobetsu}</p>
                                            <p><span className="text-gray-400">糸渡し:</span> {r.itowatashi_date}</p>
                                            <p className="text-indigo-600 font-bold"><span className="text-gray-400">予定日:</span> {r.scheduled_date} (日除外計算)</p>
                                            {r.note && <p className="text-xs bg-gray-50 p-2 mt-2 rounded">備考: {r.note}</p>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* ② 管理タブ (入力) */}
                        {tab === '管理' && (
                            <div className="space-y-4 text-sm">
                                <div className="grid grid-cols-2 gap-2">
                                    <input placeholder="柄番" className="border p-2 rounded" onChange={e=>setFormData({...formData, gara_ban: e.target.value})} />
                                    <select className="border p-2 rounded" onChange={e=>setFormData({...formData, gara_type: e.target.value})}>
                                        <option>○大島</option><option>一元or地紋</option><option>総絣</option>
                                    </select>
                                </div>
                                <input placeholder="柄名" className="w-full border p-2 rounded" onChange={e=>setFormData({...formData, gara_name: e.target.value})} />
                                <div className="grid grid-cols-2 gap-2">
                                    <select className="border p-2 rounded" onChange={e=>setFormData({...formData, itobetsu: e.target.value})}>
                                        <option>絣緯</option><option>地緯</option><option>絣経</option>
                                    </select>
                                    <input placeholder="締め者名" className="border p-2 rounded" onChange={e=>setFormData({...formData, shime_name: e.target.value})} />
                                </div>
                                <div className="grid grid-cols-3 gap-2">
                                    <input type="number" placeholder="品数" className="border p-2 rounded text-xs" onChange={e=>setFormData({...formData, shinasu: e.target.value})} />
                                    <input type="number" placeholder="サガリ" className="border p-2 rounded text-xs" onChange={e=>setFormData({...formData, sagari: e.target.value})} />
                                    <input type="number" placeholder="マルキ" className="border p-2 rounded text-xs" onChange={e=>setFormData({...formData, maruki: e.target.value})} />
                                </div>
                                <div className="bg-indigo-50 p-3 rounded-lg">
                                    <p className="text-[10px] text-indigo-400 mb-2 font-bold">難易度評価 (1:少〜5:多)</p>
                                    <div className="grid grid-cols-3 gap-2">
                                        <div>柄抜き<input type="number" min="1" max="5" className="w-full p-1 border" defaultValue="3" onChange={e=>setFormData({...formData, nuki_score: e.target.value})} /></div>
                                        <div>ホス数<input type="number" min="1" max="5" className="w-full p-1 border" defaultValue="3" onChange={e=>setFormData({...formData, hosu_score: e.target.value})} /></div>
                                        <div>枚数<input type="number" min="1" max="5" className="w-full p-1 border" defaultValue="3" onChange={e=>setFormData({...formData, maisu_score: e.target.value})} /></div>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div><label className="text-[10px]">糸渡し日</label><input type="date" className="w-full border p-2 rounded text-xs" value={formData.itowatashi_date} onChange={e=>setFormData({...formData, itowatashi_date: e.target.value})} /></div>
                                    <div><label className="text-[10px]">締め上がり日(任意)</label><input type="date" className="w-full border p-2 rounded text-xs" onChange={e=>setFormData({...formData, completion_date: e.target.value})} /></div>
                                </div>
                                <input type="number" placeholder="締め工賃 (¥)" className="w-full border p-2 rounded" onChange={e=>setFormData({...formData, wage: e.target.value})} />
                                <textarea placeholder="備考" className="w-full border p-2 rounded" onChange={e=>setFormData({...formData, note: e.target.value})}></textarea>
                                <button onClick={handleSave} className="w-full bg-indigo-700 text-white py-4 rounded-xl font-bold shadow-lg active:bg-indigo-900 transition-all">
                                    データを保存する
                                </button>
                            </div>
                        )}

                        {/* ③ 履歴タブ */}
                        {tab === '履歴' && (
                            <div className="space-y-2 text-[10px]">
                                <table className="w-full border-collapse border">
                                    <thead>
                                        <tr className="bg-gray-100">
                                            <th className="border p-1">締め者</th><th className="border p-1">柄名</th><th className="border p-1">工賃</th><th className="border p-1">難易度</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {records.map(r => (
                                            <tr key={r.id}>
                                                <td className="border p-1">{r.shime_name}</td>
                                                <td className="border p-1">{r.gara_name}</td>
                                                <td className="border p-1">¥{Number(r.wage).toLocaleString()}</td>
                                                <td className={`border p-1 text-white ${r.difficultyColor}`}>{r.difficulty}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {/* ④ 工賃計算タブ */}
                        {tab === '工賃計算' && (
                            <div className="space-y-4">
                                <div className="bg-yellow-50 p-4 rounded-lg border border-yellow-200">
                                    <h3 className="font-bold text-yellow-800 text-sm mb-2">過去実績からの参考工賃</h3>
                                    {['低', '中', '高'].map(diff => {
                                        const sameDiffRecords = records.filter(r => r.difficulty === diff && r.wage);
                                        const avgWage = sameDiffRecords.length > 0 
                                            ? Math.round(sameDiffRecords.reduce((sum, r) => sum + Number(r.wage), 0) / sameDiffRecords.length)
                                            : 0;
                                        return (
                                            <div key={diff} className="flex justify-between py-1 border-b border-yellow-100 last:border-0">
                                                <span>難易度 【{diff}】:</span>
                                                <span className="font-mono font-bold">¥ {avgWage.toLocaleString()}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                                <p className="text-[10px] text-gray-400">※難易度別の平均工賃を表示しています。</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
