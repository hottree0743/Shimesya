<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大島紬 締め者管理 v5</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f1f5f9; }
        .input-label { display: block; font-size: 0.75rem; font-weight: bold; color: #475569; margin-bottom: 0.25rem; margin-top: 0.75rem; }
        .form-input { width: 100%; border: 1px solid #cbd5e1; padding: 0.75rem; border-radius: 0.5rem; background: white; font-size: 0.9rem; appearance: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 設定値 ---
        const SHIME_MEMBERS = ["小江", "川井", "前島", "友松"];
        const ITOBETSUS = ["絣緯", "地緯", "絣経"];

        // --- ユーティリティ: 日曜日を除外した日付計算 ---
        const addWorkDays = (startDateStr, daysToAdd) => {
            let date = new Date(startDateStr);
            if (isNaN(date.getTime())) return "日付エラー";
            let addedDays = 0;
            while (addedDays < daysToAdd) {
                date.setDate(date.getDate() + 1);
                if (date.getDay() !== 0) addedDays++; // 0は日曜日
            }
            return date.toISOString().split('T')[0];
        };

        function App() {
            const [tab, setTab] = useState('進行');
            const [records, setRecords] = useState([]);
            const [editingId, setEditingId] = useState(null);

            const initialForm = {
                gara_ban: '', gara_name: '', 
                gara_main_type: '白', gara_keito_type: '一元', gara_kousei_type: '総絣',
                itobetsu: '絣緯', shime_name: SHIME_MEMBERS[0],
                shinasu: '', sagari: '', maruki: '',
                itowatashi_date: new Date().toISOString().split('T')[0],
                completion_date: '', wage: '', nuki_rank: '中', hosu_score: 3, maisu_score: 3, note: ''
            };
            const [formData, setFormData] = useState(initialForm);

            useEffect(() => {
                const saved = localStorage.getItem('oshimatsumugi-v5');
                if (saved) setRecords(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('oshimatsumugi-v5', JSON.stringify(records));
            }, [records]);

            // --- 予定日算出ロジック ---
            const getScheduledDate = (shimeName, itobetsu, startDate) => {
                // 同じ締め者かつ同じ糸別で、完了日が入力されている過去データを抽出
                const pastData = records.filter(r => 
                    r.shime_name === shimeName && 
                    r.itobetsu === itobetsu && 
                    r.completion_date && r.completion_date !== ""
                );

                let avgDays = 30; // 過去データがない場合のデフォルト（例に合わせ30日）

                if (pastData.length > 0) {
                    const totalDays = pastData.reduce((sum, r) => {
                        const start = new Date(r.itowatashi_date);
                        const end = new Date(r.completion_date);
                        // 単純な日数差ではなく実働日を逆算するのは複雑なため、ここでは平均カレンダー日数を算出
                        return sum + Math.round((end - start) / (1000 * 60 * 60 * 24));
                    }, 0);
                    avgDays = Math.max(1, Math.round(totalDays / pastData.length));
                }
                
                // 日曜日を飛ばして予定日を算出
                return addWorkDays(startDate, avgDays);
            };

            const determineDifficulty = (data) => {
                if (data.nuki_rank === '高') return { label: '高', color: 'bg-red-500' };
                if (data.nuki_rank === '低') return { label: '低', color: 'bg-green-500' };
                const total = Number(data.hosu_score) + Number(data.maisu_score);
                if (total >= 8) return { label: '高', color: 'bg-red-500' };
                if (total <= 4) return { label: '低', color: 'bg-green-500' };
                return { label: '中', color: 'bg-yellow-500' };
            };

            const handleSave = () => {
                if (!formData.gara_name) return alert("柄名を入力してください");
                
                const diff = determineDifficulty(formData);
                const sched = getScheduledDate(formData.shime_name, formData.itobetsu, formData.itowatashi_date);
                
                const newRecord = {
                    ...formData,
                    id: editingId || Date.now(),
                    difficulty: diff.label,
                    difficultyColor: diff.color,
                    scheduled_date: sched,
                    full_gara_type: `${formData.gara_main_type} / ${formData.gara_keito_type} / ${formData.gara_kousei_type}`
                };

                if (editingId) {
                    setRecords(records.map(r => r.id === editingId ? newRecord : r));
                } else {
                    setRecords([newRecord, ...records]);
                }

                setFormData(initialForm);
                setEditingId(null);
                alert("保存しました");
                setTab('進行');
            };

            const deleteRecord = (id) => {
                if (confirm("このデータを削除してもよろしいですか？")) {
                    setRecords(records.filter(r => r.id !== id));
                }
            };

            const startEdit = (record) => {
                setFormData(record);
                setEditingId(record.id);
                setTab('管理');
            };

            const activeRecords = records.filter(r => !r.completion_date);

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-xl flex flex-col pb-10">
                    <header className="bg-slate-800 text-white p-4 text-center font-bold flex justify-between items-center">
                        <span>大島紬 締め管理 v5</span>
                        <span className="text-[10px] bg-green-600 px-2 py-0.5 rounded-full">稼働中</span>
                    </header>

                    <nav className="flex bg-slate-100 border-b text-[11px] font-bold sticky top-0 z-10 shadow-sm">
                        {['進行', '管理', '履歴', '工賃計算'].map(t => (
                            <button key={t} onClick={() => { setTab(t); if(t!=='管理') { setEditingId(null); setFormData(initialForm); } }}
                                className={`flex-1 py-4 ${tab === t ? 'bg-white text-blue-700 border-b-2 border-blue-700' : 'text-gray-400'}`}>
                                {t}
                            </button>
                        ))}
                    </nav>

                    <main className="flex-1 p-4 overflow-y-auto">
                        {/* ① 進行タブ */}
                        {tab === '進行' && (
                            <div className="space-y-4">
                                <h2 className="text-xs font-bold text-slate-400 mb-2">進行中の案件（最大4件）</h2>
                                {activeRecords.length === 0 ? <p className="text-center py-10 text-gray-300">現在、稼働中の案件はありません</p> : 
                                activeRecords.slice(0, 4).map(r => (
                                    <div key={r.id} className="bg-white border rounded-xl p-4 shadow-sm relative border-l-8 border-slate-700">
                                        <div className={`absolute top-0 right-0 px-2 py-1 text-white text-[9px] font-bold rounded-bl-lg ${r.difficultyColor}`}>難易度:{r.difficulty}</div>
                                        <div className="font-bold text-lg text-slate-800">{r.shime_name} <span className="text-xs font-normal">さん</span></div>
                                        <div className="text-xs space-y-1 mt-2 text-slate-600">
                                            <p>柄: {r.gara_name} ({r.itobetsu})</p>
                                            <p className="text-blue-600 font-bold bg-blue-50 p-2 mt-2 rounded">
                                                予定日: {r.scheduled_date} <span className="font-normal text-[9px] text-blue-400">(日曜除外)</span>
                                            </p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* ② 管理タブ (新規登録/編集) */}
                        {tab === '管理' && (
                            <div className="animate-in fade-in duration-300">
                                <div className="bg-yellow-50 border border-yellow-200 p-2 rounded mb-4 text-[10px] text-yellow-700 font-bold">
                                    {editingId ? "【履歴から編集】締め上がり日の入力が可能です" : "【新規登録】糸渡しまでの情報を入力してください"}
                                </div>
                                
                                <label className="input-label">締め者の名前</label>
                                <select className="form-input" value={formData.shime_name} onChange={e=>setFormData({...formData, shime_name: e.target.value})}>
                                    {SHIME_MEMBERS.map(m => <option key={m}>{m}</option>)}
                                </select>

                                <label className="input-label">柄番</label>
                                <input className="form-input" value={formData.gara_ban} onChange={e=>setFormData({...formData, gara_ban: e.target.value})} />

                                <label className="input-label">柄名</label>
                                <input className="form-input" value={formData.gara_name} onChange={e=>setFormData({...formData, gara_name: e.target.value})} />

                                <label className="input-label">柄の種類</label>
                                <div className="grid grid-cols-3 gap-1">
                                    <select className="form-input text-[10px]" value={formData.gara_main_type} onChange={e=>setFormData({...formData, gara_main_type: e.target.value})}>
                                        {['白','ベージュ','丸式','風雅','脱色','泥','白泥'].map(v=><option key={v}>{v}</option>)}
                                    </select>
                                    <select className="form-input text-[10px]" value={formData.gara_keito_type} onChange={e=>setFormData({...formData, gara_keito_type: e.target.value})}>
                                        {['一元','地紋'].map(v=><option key={v}>{v}</option>)}
                                    </select>
                                    <select className="form-input text-[10px]" value={formData.gara_kousei_type} onChange={e=>setFormData({...formData, gara_kousei_type: e.target.value})}>
                                        {['総絣','タフコ','ユタフコ'].map(v=><option key={v}>{v}</option>)}
                                    </select>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="input-label">糸別</label>
                                        <select className="form-input" value={formData.itobetsu} onChange={e=>setFormData({...formData, itobetsu: e.target.value})}>
                                            {ITOBETSUS.map(i => <option key={i}>{i}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="input-label">ガス糸のマルキ数</label>
                                        <input type="number" className="form-input" value={formData.maruki} onChange={e=>setFormData({...formData, maruki: e.target.value})} />
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="input-label text-blue-600">糸渡し日</label><input type="date" className="form-input text-xs" value={formData.itowatashi_date} onChange={e=>setFormData({...formData, itowatashi_date: e.target.value})} /></div>
                                    {editingId && (
                                        <div><label className="input-label text-red-600">締め上がり日 (完了)</label><input type="date" className="form-input text-xs border-red-300" value={formData.completion_date} onChange={e=>setFormData({...formData, completion_date: e.target.value})} /></div>
                                    )}
                                </div>

                                <div className="bg-slate-50 p-4 rounded-lg mt-4 border">
                                    <label className="input-label mt-0">柄抜きの多さ</label>
                                    <select className="form-input mb-2" value={formData.nuki_rank} onChange={e=>setFormData({...formData, nuki_rank: e.target.value})}>
                                        <option value="低">低 (難易度:低)</option>
                                        <option value="中">中 (通常判定)</option>
                                        <option value="高">高 (難易度:高)</option>
                                    </select>
                                    <div className="grid grid-cols-2 gap-2 text-[10px]">
                                        <div>ホス数(1-5)<input type="number" className="form-input" value={formData.hosu_score} onChange={e=>setFormData({...formData, hosu_score: e.target.value})} /></div>
                                        <div>枚数(1-5)<input type="number" className="form-input" value={formData.maisu_score} onChange={e=>setFormData({...formData, maisu_score: e.target.value})} /></div>
                                    </div>
                                </div>

                                <label className="input-label">締め工賃 (¥)</label>
                                <input type="number" className="form-input" value={formData.wage} onChange={e=>setFormData({...formData, wage: e.target.value})} />

                                <label className="input-label">備考</label>
                                <textarea className="form-input mb-4" rows="2" value={formData.note} onChange={e=>setFormData({...formData, note: e.target.value})}></textarea>

                                <button onClick={handleSave} className="w-full bg-slate-800 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition-transform">
                                    {editingId ? "変更を保存（完了登録）" : "新規登録して保存"}
                                </button>
                            </div>
                        )}

                        {/* ③ 履歴タブ */}
                        {tab === '履歴' && (
                            <div className="space-y-3">
                                {records.map(r => (
                                    <div key={r.id} className="bg-white border rounded p-3 text-[11px] shadow-sm flex flex-col gap-2">
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <span className="font-bold text-sm text-slate-800">{r.shime_name}</span>
                                                <span className={`ml-2 ${r.difficultyColor} text-white px-1 rounded text-[9px]`}>{r.difficulty}</span>
                                                <p className="text-gray-500">{r.gara_name} ({r.itobetsu})</p>
                                            </div>
                                            <div className="text-right">
                                                <p className={r.completion_date ? "text-green-600 font-bold" : "text-orange-500"}>
                                                    {r.completion_date ? `完了: ${r.completion_date}` : "【進行中】"}
                                                </p>
                                                <p className="text-gray-400">¥{Number(r.wage || 0).toLocaleString()}</p>
                                            </div>
                                        </div>
                                        <div className="flex gap-2 border-t pt-2 mt-1">
                                            <button onClick={()=>startEdit(r)} className="flex-1 bg-blue-50 text-blue-600 py-2 rounded font-bold border border-blue-100">
                                                {r.completion_date ? "修正" : "完了/編集"}
                                            </button>
                                            <button onClick={()=>deleteRecord(r.id)} className="px-3 bg-red-50 text-red-500 py-2 rounded font-bold border border-red-100">削除</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* ④ 工賃計算タブ */}
                        {tab === '工賃計算' && (
                            <div className="space-y-4">
                                <div className="bg-blue-50 p-6 rounded-xl border border-blue-200">
                                    <h3 className="font-bold text-blue-900 mb-4 text-center text-sm">難易度別 平均工賃実績</h3>
                                    {['低', '中', '高'].map(level => {
                                        const matching = records.filter(r => r.difficulty === level && r.wage > 0);
                                        const avg = matching.length > 0 ? Math.round(matching.reduce((s, r) => s + Number(r.wage), 0) / matching.length) : 0;
                                        return (
                                            <div key={level} className="flex justify-between items-center py-3 border-b border-blue-100 last:border-0">
                                                <span className="font-bold text-slate-700">【{level}】</span>
                                                <span className="text-lg font-mono text-blue-800">¥ {avg.toLocaleString()}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
