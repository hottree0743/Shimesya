<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大島紬 締め管理 v6</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f8fafc; }
        .input-label { display: block; font-size: 0.75rem; font-weight: bold; color: #475569; margin-bottom: 0.25rem; margin-top: 0.75rem; }
        .form-input { width: 100%; border: 1px solid #cbd5e1; padding: 0.75rem; border-radius: 0.5rem; background: white; font-size: 0.9rem; }
        .tab-btn { flex: 1; py-3 text-[10px] font-bold transition-all border-b-2; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SHIME_MEMBERS = ["小江", "川井", "前島", "友松"];
        const ITOBETSUS = ["絣緯", "地緯", "絣経"];
        const DIFF_LEVELS = ["低", "中", "高"];

        const addWorkDays = (startDateStr, daysToAdd) => {
            let date = new Date(startDateStr);
            if (isNaN(date.getTime())) return "エラー";
            let addedDays = 0;
            while (addedDays < daysToAdd) {
                date.setDate(date.getDate() + 1);
                if (date.getDay() !== 0) addedDays++;
            }
            return date.toISOString().split('T')[0];
        };

        function App() {
            const [tab, setTab] = useState('進行');
            const [records, setRecords] = useState([]);
            const [editingId, setEditingId] = useState(null);

            const initialForm = {
                gara_ban: '', gara_name: '', gara_main_type: '白', gara_keito_type: '一元', gara_kousei_type: '総絣',
                itobetsu: '絣緯', shime_name: SHIME_MEMBERS[0], shinasu: '', sagari: '', maruki: '',
                itowatashi_date: new Date().toISOString().split('T')[0], completion_date: '', wage: '',
                nuki_rank: '中', hosu_score: 3, maisu_score: 3, note: ''
            };
            const [formData, setFormData] = useState(initialForm);

            useEffect(() => {
                const saved = localStorage.getItem('oshimatsumugi-v6');
                if (saved) setRecords(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('oshimatsumugi-v6', JSON.stringify(records));
            }, [records]);

            // --- 予定日計算ロジック ---
            const getScheduledDate = (shimeName, itobetsu, startDate) => {
                const pastData = records.filter(r => r.shime_name === shimeName && r.itobetsu === itobetsu && r.completion_date);
                let avgDays = 30;
                if (pastData.length > 0) {
                    const totalDays = pastData.reduce((sum, r) => {
                        const s = new Date(r.itowatashi_date), e = new Date(r.completion_date);
                        return sum + Math.round((e - s) / (86400000));
                    }, 0);
                    avgDays = Math.max(1, Math.round(totalDays / pastData.length));
                }
                return addWorkDays(startDate, avgDays);
            };

            const handleSave = () => {
                if (!formData.gara_name) return alert("柄名を入力してください");
                const nukiScore = formData.nuki_rank === '高' ? 5 : (formData.nuki_rank === '低' ? 1 : 3);
                const total = nukiScore + Number(formData.hosu_score) + Number(formData.maisu_score);
                const diffLabel = formData.nuki_rank === '高' ? '高' : (formData.nuki_rank === '低' ? '低' : (total >= 11 ? '高' : (total <= 6 ? '低' : '中')));
                const diffColor = diffLabel === '高' ? 'bg-red-500' : (diffLabel === '低' ? 'bg-green-500' : 'bg-yellow-500');

                const newRecord = {
                    ...formData,
                    id: editingId || Date.now(),
                    difficulty: diffLabel,
                    difficultyColor: diffColor,
                    scheduled_date: getScheduledDate(formData.shime_name, formData.itobetsu, formData.itowatashi_date),
                    full_gara_type: `${formData.gara_main_type}/${formData.gara_keito_type}/${formData.gara_kousei_type}`
                };

                setRecords(editingId ? records.map(r => r.id === editingId ? newRecord : r) : [newRecord, ...records]);
                setFormData(initialForm);
                setEditingId(null);
                setTab('進行');
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-2xl flex flex-col pb-10">
                    <header className="bg-slate-900 text-white p-4 text-center font-bold text-sm tracking-widest">
                        大島紬 締め管理システム v6
                    </header>

                    <nav className="flex bg-slate-100 border-b sticky top-0 z-20">
                        {['進行', '管理', '履歴', '工賃計算', '分析'].map(t => (
                            <button key={t} onClick={() => setTab(t)}
                                className={`flex-1 py-4 text-[10px] font-bold ${tab === t ? 'bg-white text-indigo-600 border-b-2 border-indigo-600' : 'text-gray-400 border-transparent'}`}>
                                {t}
                            </button>
                        ))}
                    </nav>

                    <main className="flex-1 p-4 overflow-y-auto">
                        {/* 進行タブ */}
                        {tab === '進行' && (
                            <div className="space-y-4">
                                {records.filter(r => !r.completion_date).map(r => (
                                    <div key={r.id} className="bg-white border rounded-xl p-4 shadow-sm relative border-l-4 border-slate-900">
                                        <div className={`absolute top-0 right-0 px-2 py-1 text-white text-[9px] font-bold rounded-bl-lg ${r.difficultyColor}`}>難易度:{r.difficulty}</div>
                                        <div className="font-bold text-slate-800">{r.shime_name} <span className="text-[10px] text-gray-400 font-normal">柄番:{r.gara_ban}</span></div>
                                        <div className="text-xs mt-2 space-y-1 text-slate-600">
                                            <p>柄名: <span className="font-bold text-slate-800">{r.gara_name}</span> ({r.itobetsu})</p>
                                            <p>渡し日: {r.itowatashi_date}</p>
                                            <p className="text-indigo-600 font-bold bg-indigo-50 p-2 rounded mt-2">完了予定: {r.scheduled_date}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* 管理タブ */}
                        {tab === '管理' && (
                            <div className="text-sm">
                                <label className="input-label">締め者</label>
                                <select className="form-input" value={formData.shime_name} onChange={e=>setFormData({...formData, shime_name: e.target.value})}>
                                    {SHIME_MEMBERS.map(m => <option key={m}>{m}</option>)}
                                </select>
                                <div className="grid grid-cols-2 gap-2">
                                    <div><label className="input-label">柄番</label><input className="form-input" value={formData.gara_ban} onChange={e=>setFormData({...formData, gara_ban: e.target.value})} /></div>
                                    <div><label className="input-label">柄名</label><input className="form-input" value={formData.gara_name} onChange={e=>setFormData({...formData, gara_name: e.target.value})} /></div>
                                </div>
                                <label className="input-label">糸別</label>
                                <select className="form-input" value={formData.itobetsu} onChange={e=>setFormData({...formData, itobetsu: e.target.value})}>
                                    {ITOBETSUS.map(i => <option key={i}>{i}</option>)}
                                </select>
                                {editingId && (
                                    <div><label className="input-label text-red-500">締め上がり日</label><input type="date" className="form-input border-red-200" value={formData.completion_date} onChange={e=>setFormData({...formData, completion_date: e.target.value})} /></div>
                                )}
                                <label className="input-label">締め工賃 (¥)</label>
                                <input type="number" className="form-input" value={formData.wage} onChange={e=>setFormData({...formData, wage: e.target.value})} />
                                <button onClick={handleSave} className="w-full bg-slate-900 text-white py-4 rounded-xl font-bold mt-6 shadow-lg active:scale-95 transition-all">
                                    {editingId ? "更新する" : "保存する"}
                                </button>
                            </div>
                        )}

                        {/* 履歴タブ */}
                        {tab === '履歴' && (
                            <div className="space-y-2">
                                {records.map(r => (
                                    <div key={r.id} className="bg-white border rounded-lg p-3 text-[10px] flex justify-between items-center shadow-sm">
                                        <div className="flex-1">
                                            <p className="font-bold text-slate-800 text-xs">{r.shime_name} / {r.gara_name}</p>
                                            <p className="text-gray-400">柄番:{r.gara_ban} | {r.itobetsu} | ¥{Number(r.wage).toLocaleString()}</p>
                                        </div>
                                        <button onClick={()=>{setFormData(r); setEditingId(r.id); setTab('管理');}} className="bg-slate-100 px-3 py-2 rounded font-bold ml-2">編集</button>
                                        <button onClick={()=>{if(confirm("削除しますか？")) setRecords(records.filter(x=>x.id!==r.id))}} className="text-red-400 ml-2">消去</button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* 工賃計算タブ */}
                        {tab === '工賃計算' && (
                            <div className="space-y-4">
                                {ITOBETSUS.map(ito => (
                                    <div key={ito} className="bg-white border rounded-xl overflow-hidden shadow-sm">
                                        <div className="bg-slate-800 text-white p-2 text-xs font-bold text-center">{ito}</div>
                                        <div className="p-3 space-y-2">
                                            {DIFF_LEVELS.map(lv => {
                                                const match = records.filter(r => r.itobetsu === ito && r.difficulty === lv && r.wage > 0);
                                                const avg = match.length ? Math.round(match.reduce((s,r)=>s+Number(r.wage),0)/match.length) : 0;
                                                return (
                                                    <div key={lv} className="flex justify-between items-center text-xs border-b pb-1 last:border-0">
                                                        <span className="text-gray-500">難易度【{lv}】</span>
                                                        <span className="font-bold text-slate-800">¥{avg.toLocaleString()}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* 分析タブ */}
                        {tab === '分析' && (
                            <div className="space-y-6">
                                {SHIME_MEMBERS.map(member => (
                                    <div key={member} className="bg-white border rounded-xl p-4 shadow-sm border-t-4 border-indigo-500">
                                        <h3 className="font-bold text-slate-800 border-b pb-2 mb-3">{member} さんの分析</h3>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <h4 className="text-[9px] font-bold text-indigo-400 uppercase">平均完成日数</h4>
                                                {ITOBETSUS.map(ito => {
                                                    const match = records.filter(r => r.shime_name === member && r.itobetsu === ito && r.completion_date);
                                                    const avg = match.length ? Math.round(match.reduce((s,r)=>(s+(new Date(r.completion_date)-new Date(r.itowatashi_date))),0)/match.length/86400000) : "--";
                                                    return <p key={ito} className="text-[11px] mt-1">{ito}: <span className="font-bold text-slate-700">{avg}日</span></p>;
                                                })}
                                            </div>
                                            <div>
                                                <h4 className="text-[9px] font-bold text-indigo-400 uppercase">年間製造数 ({new Date().getFullYear()}年)</h4>
                                                {ITOBETSUS.map(ito => {
                                                    const count = records.filter(r => r.shime_name === member && r.itobetsu === ito && r.completion_date && new Date(r.completion_date).getFullYear() === new Date().getFullYear()).length;
                                                    return <p key={ito} className="text-[11px] mt-1">{ito}: <span className="font-bold text-slate-700">{count} 柄</span></p>;
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
