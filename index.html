<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大島紬 締め者管理 v4</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f1f5f9; }
        .input-label { display: block; font-size: 0.75rem; font-weight: bold; color: #475569; margin-bottom: 0.25rem; margin-top: 0.75rem; }
        .form-input { width: 100%; border: 1px solid #cbd5e1; padding: 0.75rem; border-radius: 0.5rem; background: white; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 日曜除外ロジック ---
        const addWorkDays = (startDate, daysToAdd) => {
            let date = new Date(startDate);
            if (isNaN(date.getTime())) date = new Date();
            let addedDays = 0;
            while (addedDays < daysToAdd) {
                date.setDate(date.getDate() + 1);
                if (date.getDay() !== 0) addedDays++;
            }
            return date.toISOString().split('T')[0];
        };

        function App() {
            const [tab, setTab] = useState('進行');
            const [records, setRecords] = useState([]);
            const [editingId, setEditingId] = useState(null);

            const initialForm = {
                gara_ban: '', gara_main_type: '白', gara_keito_type: '一元', gara_kousei_type: '総絣',
                gara_name: '', itobetsu: '絣緯', shinasu: '', sagari: '', maruki: '', shime_name: '',
                itowatashi_date: new Date().toISOString().split('T')[0],
                completion_date: '', wage: '', nuki_rank: '中', hosu_score: 3, maisu_score: 3, note: ''
            };
            const [formData, setFormData] = useState(initialForm);

            // データ読み込み
            useEffect(() => {
                const saved = localStorage.getItem('oshimatsumugi-v4');
                if (saved) setRecords(JSON.parse(saved));
            }, []);

            // データ保存
            useEffect(() => {
                localStorage.setItem('oshimatsumugi-v4', JSON.stringify(records));
            }, [records]);

            // 難易度判定
            const determineDifficulty = (data) => {
                if (data.nuki_rank === '高') return { label: '高', color: 'bg-red-500' };
                if (data.nuki_rank === '低') return { label: '低', color: 'bg-green-500' };
                const total = Number(data.hosu_score) + Number(data.maisu_score);
                if (total >= 8) return { label: '高', color: 'bg-red-500' };
                if (total <= 4) return { label: '低', color: 'bg-green-500' };
                return { label: '中', color: 'bg-yellow-500' };
            };

            // 予定日計算
            const calculateScheduledDate = (shimeName, itobetsu, startDate) => {
                const pastData = records.filter(r => r.shime_name === shimeName && r.itobetsu === itobetsu && r.completion_date);
                let avgDays = 10;
                if (pastData.length > 0) {
                    const totalDays = pastData.reduce((sum, r) => {
                        const s = new Date(r.itowatashi_date);
                        const e = new Date(r.completion_date);
                        return sum + (e - s) / (1000 * 60 * 60 * 24);
                    }, 0);
                    avgDays = Math.max(1, Math.round(totalDays / pastData.length));
                }
                return addWorkDays(startDate, avgDays);
            };

            const handleSave = () => {
                if (!formData.shime_name || !formData.gara_name) {
                    alert("締め者名と柄名は必須項目です。");
                    return;
                }
                
                const diff = determineDifficulty(formData);
                const sched = calculateScheduledDate(formData.shime_name, formData.itobetsu, formData.itowatashi_date);
                
                const newRecord = {
                    ...formData,
                    id: editingId || Date.now(),
                    difficulty: diff.label,
                    difficultyColor: diff.color,
                    scheduled_date: sched,
                    full_gara_type: `${formData.gara_main_type} / ${formData.gara_keito_type} / ${formData.gara_kousei_type}`
                };

                if (editingId) {
                    setRecords(records.map(r => r.id === editingId ? newRecord : r));
                } else {
                    setRecords([newRecord, ...records]);
                }

                setFormData(initialForm);
                setEditingId(null);
                alert("保存が完了しました。進行タブを確認してください。");
                setTab('進行');
            };

            const startEdit = (record) => {
                setFormData(record);
                setEditingId(record.id);
                setTab('管理');
            };

            // 進行中のフィルターロジックを強化
            const activeRecords = records.filter(r => r.completion_date === "" || r.completion_date === null);

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-xl flex flex-col">
                    <header className="bg-slate-800 text-white p-4 text-center font-bold">
                        締め者管理 v4.0 <span className="text-[10px] bg-red-600 px-1 rounded">最新</span>
                    </header>

                    <nav className="flex bg-slate-100 border-b overflow-x-auto text-xs sticky top-0 z-10 shadow-sm">
                        {['進行', '管理', '履歴', '工賃計算'].map(t => (
                            <button key={t} onClick={() => setTab(t)}
                                className={`flex-1 py-4 whitespace-nowrap px-2 font-bold ${tab === t ? 'bg-white text-blue-700 border-b-2 border-blue-700' : 'text-gray-400'}`}>
                                {t}
                            </button>
                        ))}
                    </nav>

                    <main className="flex-1 p-4 overflow-y-auto pb-20">
                        {tab === '進行' && (
                            <div className="space-y-4">
                                <h2 className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">進行中の案件 ({activeRecords.length}件)</h2>
                                {activeRecords.length === 0 ? (
                                    <div className="text-center py-20 border-2 border-dashed border-gray-100 rounded-xl text-gray-300">
                                        進行中のデータはありません
                                    </div>
                                ) : (
                                    activeRecords.slice(0, 4).map(r => (
                                        <div key={r.id} className="bg-white border rounded-xl p-4 shadow-sm relative border-l-8 border-slate-800">
                                            <div className={`absolute top-0 right-0 px-2 py-1 text-white text-[10px] rounded-bl-lg font-bold ${r.difficultyColor}`}>
                                                難易度:{r.difficulty}
                                            </div>
                                            <div className="font-bold text-lg text-slate-800 underline decoration-slate-200 decoration-4">{r.shime_name}</div>
                                            <div className="text-xs space-y-1 mt-3 text-slate-600">
                                                <p><span className="text-slate-400">柄名:</span> {r.gara_name}</p>
                                                <p><span className="text-slate-400">型式:</span> {r.full_gara_type}</p>
                                                <p><span className="text-slate-400">ムシロ:</span> {r.itobetsu}</p>
                                                <div className="mt-2 p-2 bg-blue-50 rounded text-blue-700 font-bold flex justify-between">
                                                    <span>予定日: {r.scheduled_date}</span>
                                                    <span className="text-[9px] font-normal">※日曜除外</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {tab === '管理' && (
                            <div className="animate-in slide-in-from-bottom-2 duration-300">
                                <label className="input-label">柄番</label>
                                <input className="form-input" value={formData.gara_ban} onChange={e=>setFormData({...formData, gara_ban: e.target.value})} />

                                <label className="input-label">柄名</label>
                                <input className="form-input" value={formData.gara_name} onChange={e=>setFormData({...formData, gara_name: e.target.value})} />

                                <label className="input-label">柄の種類 (⚪︎大島 / 経糸構成 / 柄構成)</label>
                                <div className="grid grid-cols-3 gap-1">
                                    <select className="form-input text-[10px]" value={formData.gara_main_type} onChange={e=>setFormData({...formData, gara_main_type: e.target.value})}>
                                        {['白','ベージュ','丸式','風雅','脱色','泥','白泥'].map(v=><option key={v}>{v}</option>)}
                                    </select>
                                    <select className="form-input text-[10px]" value={formData.gara_keito_type} onChange={e=>setFormData({...formData, gara_keito_type: e.target.value})}>
                                        {['一元','地紋'].map(v=><option key={v}>{v}</option>)}
                                    </select>
                                    <select className="form-input text-[10px]" value={formData.gara_kousei_type} onChange={e=>setFormData({...formData, gara_kousei_type: e.target.value})}>
                                        {['総絣','タフコ','ユタフコ'].map(v=><option key={v}>{v}</option>)}
                                    </select>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="input-label">糸別</label>
                                        <select className="form-input" value={formData.itobetsu} onChange={e=>setFormData({...formData, itobetsu: e.target.value})}>
                                            <option>絣緯</option><option>地緯</option><option>絣経</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="input-label">締め者の名前</label>
                                        <input className="form-input" value={formData.shime_name} onChange={e=>setFormData({...formData, shime_name: e.target.value})} />
                                    </div>
                                </div>

                                <div className="grid grid-cols-3 gap-2">
                                    <div><label className="input-label">品数</label><input type="number" className="form-input" value={formData.shinasu} onChange={e=>setFormData({...formData, shinasu: e.target.value})} /></div>
                                    <div><label className="input-label">サガリ</label><input type="number" className="form-input" value={formData.sagari} onChange={e=>setFormData({...formData, sagari: e.target.value})} /></div>
                                    <div><label className="input-label text-[10px]">ガス糸のマルキ数</label><input type="number" className="form-input" value={formData.maruki} onChange={e=>setFormData({...formData, maruki: e.target.value})} /></div>
                                </div>

                                <label className="input-label">柄抜きの多さ</label>
                                <select className="form-input" value={formData.nuki_rank} onChange={e=>setFormData({...formData, nuki_rank: e.target.value})}>
                                    <option value="低">低 (難易度:低に設定)</option>
                                    <option value="中">中 (他要素で判定)</option>
                                    <option value="高">高 (難易度:高に設定)</option>
                                </select>

                                <div className="grid grid-cols-2 gap-2">
                                    <div><label className="input-label">ホス数 (1-5)</label><input type="number" className="form-input" value={formData.hosu_score} onChange={e=>setFormData({...formData, hosu_score: e.target.value})} /></div>
                                    <div><label className="input-label">枚数 (1-5)</label><input type="number" className="form-input" value={formData.maisu_score} onChange={e=>setFormData({...formData, maisu_score: e.target.value})} /></div>
                                </div>

                                <div className="grid grid-cols-2 gap-2">
                                    <div><label className="input-label text-blue-600">糸渡し日</label><input type="date" className="form-input text-xs" value={formData.itowatashi_date} onChange={e=>setFormData({...formData, itowatashi_date: e.target.value})} /></div>
                                    <div><label className="input-label text-red-400">締め上がり日 (完成時)</label><input type="date" className="form-input text-xs" value={formData.completion_date} onChange={e=>setFormData({...formData, completion_date: e.target.value})} /></div>
                                </div>

                                <label className="input-label">締め工賃 (¥)</label>
                                <input type="number" className="form-input" value={formData.wage} onChange={e=>setFormData({...formData, wage: e.target.value})} />

                                <label className="input-label">備考</label>
                                <textarea className="form-input mb-4" rows="2" value={formData.note} onChange={e=>setFormData({...formData, note: e.target.value})}></textarea>

                                <button onClick={handleSave} className="w-full bg-slate-800 text-white py-4 rounded-lg font-bold shadow-xl active:bg-slate-700">
                                    {editingId ? "内容を更新保存する" : "新規登録して保存"}
                                </button>
                                {editingId && <button onClick={()=>{setEditingId(null); setFormData(initialForm);}} className="w-full py-2 text-xs text-gray-400 mt-2 underline">入力をキャンセル</button>}
                            </div>
                        )}

                        {tab === '履歴' && (
                            <div className="space-y-3">
                                {records.length === 0 ? <p className="text-center text-gray-300 py-20">履歴がありません</p> : 
                                records.map(r => (
                                    <div key={r.id} className="bg-white border rounded p-3 text-[11px] shadow-sm flex justify-between items-center">
                                        <div className="flex-1">
                                            <div className="flex items-center gap-2 mb-1">
                                                <span className="font-bold text-sm text-slate-800">{r.shime_name}</span>
                                                <span className={`${r.difficultyColor} text-white px-1 rounded text-[9px]`}>{r.difficulty}</span>
                                            </div>
                                            <p className="text-gray-500">{r.gara_name} ({r.itobetsu})</p>
                                            <p className="text-gray-400">工賃: ¥{Number(r.wage || 0).toLocaleString()} / 渡し: {r.itowatashi_date}</p>
                                        </div>
                                        <button onClick={()=>startEdit(r)} className="bg-blue-600 text-white px-3 py-2 rounded-lg font-bold ml-2">編集</button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === '工賃計算' && (
                            <div className="bg-blue-50 p-6 rounded-xl border border-blue-200">
                                <h3 className="font-bold text-blue-900 mb-4 text-center">難易度別 平均工賃実績</h3>
                                {['低', '中', '高'].map(level => {
                                    const matching = records.filter(r => r.difficulty === level && r.wage && r.wage > 0);
                                    const avg = matching.length > 0 ? Math.round(matching.reduce((s, r) => s + Number(r.wage), 0) / matching.length) : 0;
                                    return (
                                        <div key={level} className="flex justify-between items-center py-3 border-b border-blue-100 last:border-0">
                                            <span className="font-bold text-slate-700">【{level}】</span>
                                            <span className="text-lg font-mono text-blue-800">¥ {avg.toLocaleString()}</span>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
