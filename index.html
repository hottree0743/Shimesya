<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>締め者管理アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ロジック関数 ---
        const addWorkDays = (startDate, daysToAdd) => {
            let date = new Date(startDate);
            let addedDays = 0;
            while (addedDays < daysToAdd) {
                date.setDate(date.getDate() + 1);
                if (date.getDay() !== 0) addedDays++;
            }
            return date;
        };

        const calculateDifficulty = (gara, hosu, maisu) => {
            const score = Number(gara) + Number(hosu) + Number(maisu);
            if (score <= 5) return { label: '低', color: 'bg-green-500' };
            if (score <= 10) return { label: '中', color: 'bg-yellow-500' };
            return { label: '高', color: 'bg-red-500' };
        };

        function App() {
            const [tab, setTab] = useState('進行');
            const [records, setRecords] = useState([]);
            const [formData, setFormData] = useState({
                shime_name: '', gara_name: '', gara_type: '大島', itobetsu: '絣緯',
                gara_nuki: 1, hosu: 1, maisu: 1, itowatashi_date: new Date().toISOString().split('T')[0]
            });

            useEffect(() => {
                const saved = localStorage.getItem('shime-data');
                if (saved) setRecords(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('shime-data', JSON.stringify(records));
            }, [records]);

            const handleSave = () => {
                if (!formData.shime_name || !formData.gara_name) {
                    alert("名前と柄名を入力してください");
                    return;
                }
                const diff = calculateDifficulty(formData.gara_nuki, formData.hosu, formData.maisu);
                const newRecord = {
                    ...formData,
                    id: Date.now(),
                    difficulty: diff.label,
                    difficultyColor: diff.color,
                    scheduled_date: addWorkDays(new Date(formData.itowatashi_date), 7).toLocaleDateString()
                };
                setRecords([newRecord, ...records]);
                setTab('進行');
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col shadow-xl bg-white">
                    <header className="bg-slate-800 text-white p-4 text-center font-bold shadow-md">
                        大島紬 締め者管理
                    </header>

                    <nav className="flex border-b">
                        {['進行', '管理', '履歴'].map(t => (
                            <button key={t} onClick={() => setTab(t)}
                                className={`flex-1 py-4 text-sm ${tab === t ? 'text-blue-600 border-b-2 border-blue-600 font-bold' : 'text-gray-500'}`}>
                                {t}
                            </button>
                        ))}
                    </nav>

                    <main className="p-4 flex-1 overflow-y-auto">
                        {tab === '進行' && (
                            <div className="space-y-4">
                                <h2 className="text-xs font-bold text-gray-400">現在進行中</h2>
                                {records.length === 0 && <p className="text-gray-400 text-center py-10">データがありません</p>}
                                {records.map(r => (
                                    <div key={r.id} className="p-4 rounded-xl border border-gray-100 shadow-sm bg-white border-l-4 border-slate-700">
                                        <div className="flex justify-between items-start">
                                            <span className="font-bold">{r.shime_name}</span>
                                            <span className={`${r.difficultyColor} text-white text-[10px] px-2 py-1 rounded`}>{r.difficulty}</span>
                                        </div>
                                        <div className="text-sm text-gray-600 mt-2">柄: {r.gara_name} ({r.itobetsu})</div>
                                        <div className="text-xs text-blue-600 mt-1 font-bold">予定: {r.scheduled_date}</div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === '管理' && (
                            <div className="space-y-4">
                                <div>
                                    <label className="text-xs text-gray-400">締め者名</label>
                                    <input type="text" className="w-full border rounded p-3 mt-1" value={formData.shime_name} onChange={e => setFormData({...formData, shime_name: e.target.value})} />
                                </div>
                                <div>
                                    <label className="text-xs text-gray-400">柄名</label>
                                    <input type="text" className="w-full border rounded p-3 mt-1" value={formData.gara_name} onChange={e => setFormData({...formData, gara_name: e.target.value})} />
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div>
                                        <label className="text-xs text-gray-400">糸渡し日</label>
                                        <input type="date" className="w-full border rounded p-3 mt-1" value={formData.itowatashi_date} onChange={e => setFormData({...formData, itowatashi_date: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-xs text-gray-400">糸別</label>
                                        <select className="w-full border rounded p-3 mt-1" value={formData.itobetsu} onChange={e => setFormData({...formData, itobetsu: e.target.value})}>
                                            <option>絣緯</option><option>地緯</option><option>絣経</option>
                                        </select>
                                    </div>
                                </div>
                                <button onClick={handleSave} className="w-full bg-slate-800 text-white py-4 rounded-xl font-bold mt-4 shadow-lg active:bg-black">保存する</button>
                            </div>
                        )}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
