<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>締め者管理アプリ</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root">
        <div class="flex items-center justify-center h-screen">
            <p class="text-gray-500">アプリを起動中...</p>
        </div>
    </div>

    <script type="text/babel">
        // Reactの機能をグローバル変数から取得
        const { useState, useEffect } = React;

        function App() {
            const [tab, setTab] = useState('進行');
            const [records, setRecords] = useState([]);
            const [formData, setFormData] = useState({
                shime_name: '', gara_name: '', gara_type: '大島', itobetsu: '絣緯',
                gara_nuki: 1, hosu: 1, maisu: 1, itowatashi_date: new Date().toISOString().split('T')[0]
            });

            // データ読み込み
            useEffect(() => {
                try {
                    const saved = localStorage.getItem('shime-data');
                    if (saved) setRecords(JSON.parse(saved));
                } catch (e) {
                    console.error("データの読み込みに失敗しました");
                }
            }, []);

            // データ保存
            useEffect(() => {
                localStorage.setItem('shime-data', JSON.stringify(records));
            }, [records]);

            const handleSave = () => {
                if (!formData.shime_name || !formData.gara_name) {
                    alert("名前と柄名を入力してください");
                    return;
                }
                const newRecord = {
                    ...formData,
                    id: Date.now(),
                    scheduled_date: "計算中..." // 簡易化のため一旦固定
                };
                setRecords([newRecord, ...records]);
                setTab('進行');
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-lg">
                    <header className="bg-slate-800 text-white p-4 text-center font-bold">
                        大島紬 締め者管理
                    </header>

                    <nav className="flex border-b text-center">
                        {['進行', '管理'].map(t => (
                            <button key={t} onClick={() => setTab(t)}
                                className={`flex-1 py-4 ${tab === t ? 'text-blue-600 border-b-2 border-blue-600 font-bold' : 'text-gray-500'}`}>
                                {t}
                            </button>
                        ))}
                    </nav>

                    <main className="p-4 flex-1">
                        {tab === '進行' && (
                            <div className="space-y-4">
                                {records.length === 0 ? (
                                    <p className="text-center text-gray-400 py-10">データがありません</p>
                                ) : (
                                    records.map(r => (
                                        <div key={r.id} className="p-4 rounded-lg border border-gray-200 border-l-4 border-slate-700 shadow-sm">
                                            <div className="font-bold text-lg">{r.shime_name}</div>
                                            <div className="text-sm text-gray-600">柄: {r.gara_name} ({r.itobetsu})</div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {tab === '管理' && (
                            <div className="space-y-4">
                                <input placeholder="締め者名" className="w-full border p-3 rounded" value={formData.shime_name} onChange={e => setFormData({...formData, shime_name: e.target.value})} />
                                <input placeholder="柄名" className="w-full border p-3 rounded" value={formData.gara_name} onChange={e => setFormData({...formData, gara_name: e.target.value})} />
                                <select className="w-full border p-3 rounded" value={formData.itobetsu} onChange={e => setFormData({...formData, itobetsu: e.target.value})}>
                                    <option>絣緯</option><option>地緯</option><option>絣経</option>
                                </select>
                                <button onClick={handleSave} className="w-full bg-slate-800 text-white py-4 rounded-lg font-bold shadow-md">
                                    保存する
                                </button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        // React 18 のレンダリング方法
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
