<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大島紬 締め者管理システム</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f1f5f9; }
        .input-label { display: block; font-size: 0.75rem; font-weight: bold; color: #475569; margin-bottom: 0.25rem; margin-top: 0.75rem; }
        .form-input { width: 100%; border: 1px solid #cbd5e1; padding: 0.75rem; rounded: 0.5rem; background: white; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 日曜除外の計算ロジック ---
        const addWorkDays = (startDate, daysToAdd) => {
            let date = new Date(startDate);
            let addedDays = 0;
            while (addedDays < daysToAdd) {
                date.setDate(date.getDate() + 1);
                if (date.getDay() !== 0) addedDays++;
            }
            return date.toISOString().split('T')[0];
        };

        function App() {
            const [tab, setTab] = useState('進行');
            const [records, setRecords] = useState([]);
            
            // フォーム初期値
            const initialForm = {
                gara_ban: '', gara_main_type: '白', gara_keito_type: '一元', gara_kousei_type: '総絣',
                gara_name: '', itobetsu: '絣緯', shinasu: '', sagari: '', maruki: '', shime_name: '',
                itowatashi_date: new Date().toISOString().split('T')[0],
                completion_date: '', wage: '', nuki_rank: '中', hosu_score: 3, maisu_score: 3, note: ''
            };
            const [formData, setFormData] = useState(initialForm);

            useEffect(() => {
                const saved = localStorage.getItem('oshimatsumugi-v2');
                if (saved) setRecords(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('oshimatsumugi-v2', JSON.stringify(records));
            }, [records]);

            // --- 難易度判定ロジック ---
            const determineDifficulty = (data) => {
                if (data.nuki_rank === '高') return { label: '高', color: 'bg-red-500' };
                if (data.nuki_rank === '低') return { label: '低', color: 'bg-green-500' };
                // 柄抜きが「中」の場合は他スコアの合計で判定
                const total = Number(data.hosu_score) + Number(data.maisu_score);
                if (total >= 8) return { label: '高', color: 'bg-red-500' };
                if (total <= 4) return { label: '低', color: 'bg-green-500' };
                return { label: '中', color: 'bg-yellow-500' };
            };

            const handleSave = () => {
                if (!formData.shime_name || !formData.gara_name) return alert("必須項目を入力してください");
                const diff = determineDifficulty(formData);
                const newRecord = {
                    ...formData,
                    id: Date.now(),
                    difficulty: diff.label,
                    difficultyColor: diff.color,
                    full_gara_type: `${formData.gara_main_type} / ${formData.gara_keito_type} / ${formData.gara_kousei_type}`
                };
                setRecords([newRecord, ...records]);
                setFormData(initialForm);
                alert("保存しました");
                setTab('進行');
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-xl flex flex-col">
                    <header className="bg-slate-800 text-white p-4 text-center font-bold">締め者管理システム</header>

                    <nav className="flex bg-slate-100 border-b overflow-x-auto text-xs">
                        {['進行', '管理', '履歴', '工賃計算'].map(t => (
                            <button key={t} onClick={() => setTab(t)}
                                className={`flex-1 py-4 whitespace-nowrap px-2 ${tab === t ? 'bg-white text-blue-700 border-b-2 border-blue-700 font-bold' : 'text-gray-500'}`}>
                                {t}
                            </button>
                        ))}
                    </nav>

                    <main className="flex-1 p-4 overflow-y-auto pb-20">
                        {/* ① 進行タブ */}
                        {tab === '進行' && (
                            <div className="space-y-4">
                                {records.filter(r => !r.completion_date).slice(0, 4).map(r => (
                                    <div key={r.id} className="bg-white border rounded-lg p-4 shadow-sm relative">
                                        <div className={`absolute top-0 right-0 px-2 py-1 text-white text-[10px] rounded-bl-lg ${r.difficultyColor}`}>
                                            難易度:{r.difficulty}
                                        </div>
                                        <div className="font-bold text-lg text-slate-800">{r.shime_name}</div>
                                        <div className="text-xs space-y-1 mt-2 text-slate-600">
                                            <p>柄: {r.gara_name} ({r.full_gara_type})</p>
                                            <p>糸別: {r.itobetsu}</p>
                                            <p className="text-blue-600 font-bold">糸渡し: {r.itowatashi_date}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* ② 管理タブ */}
                        {tab === '管理' && (
                            <div className="pb-10">
                                <label className="input-label">柄番</label>
                                <input className="form-input" value={formData.gara_ban} onChange={e=>setFormData({...formData, gara_ban: e.target.value})} />

                                <label className="input-label">柄の種類 (⚪︎大島 / 経糸構成 / 柄構成)</label>
                                <div className="grid grid-cols-3 gap-1">
                                    <select className="form-input text-xs" onChange={e=>setFormData({...formData, gara_main_type: e.target.value})}>
                                        {['白','ベージュ','丸式','風雅','脱色','泥','白泥'].map(v=><option key={v}>{v}</option>)}
                                    </select>
                                    <select className="form-input text-xs" onChange={e=>setFormData({...formData, gara_keito_type: e.target.value})}>
                                        {['一元','地紋'].map(v=><option key={v}>{v}</option>)}
                                    </select>
                                    <select className="form-input text-xs" onChange={e=>setFormData({...formData, gara_kousei_type: e.target.value})}>
                                        {['総絣','タフコ','ユタフコ'].map(v=><option key={v}>{v}</option>)}
                                    </select>
                                </div>

                                <label className="input-label">柄名</label>
                                <input className="form-input" value={formData.gara_name} onChange={e=>setFormData({...formData, gara_name: e.target.value})} />

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="input-label">糸別</label>
                                        <select className="form-input" onChange={e=>setFormData({...formData, itobetsu: e.target.value})}>
                                            <option>絣緯</option><option>地緯</option><option>絣経</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="input-label">締め者の名前</label>
                                        <input className="form-input" value={formData.shime_name} onChange={e=>setFormData({...formData, shime_name: e.target.value})} />
                                    </div>
                                </div>

                                <div className="grid grid-cols-3 gap-2">
                                    <div><label className="input-label">品数</label><input type="number" className="form-input" onChange={e=>setFormData({...formData, shinasu: e.target.value})} /></div>
                                    <div><label className="input-label">サガリ</label><input type="number" className="form-input" onChange={e=>setFormData({...formData, sagari: e.target.value})} /></div>
                                    <div><label className="input-label">ガス糸のマルキ数</label><input type="number" className="form-input" onChange={e=>setFormData({...formData, maruki: e.target.value})} /></div>
                                </div>

                                <label className="input-label">柄抜きの多さ</label>
                                <select className="form-input" value={formData.nuki_rank} onChange={e=>setFormData({...formData, nuki_rank: e.target.value})}>
                                    <option value="低">低 (難易度:低に設定)</option>
                                    <option value="中">中 (他要素で判定)</option>
                                    <option value="高">高 (難易度:高に設定)</option>
                                </select>

                                <div className="grid grid-cols-2 gap-2">
                                    <div><label className="input-label">ホス数 (1-5)</label><input type="number" className="form-input" defaultValue="3" onChange={e=>setFormData({...formData, hosu_score: e.target.value})} /></div>
                                    <div><label className="input-label">枚数 (1-5)</label><input type="number" className="form-input" defaultValue="3" onChange={e=>setFormData({...formData, maisu_score: e.target.value})} /></div>
                                </div>

                                <label className="input-label">糸渡し日</label>
                                <input type="date" className="form-input" value={formData.itowatashi_date} onChange={e=>setFormData({...formData, itowatashi_date: e.target.value})} />

                                <label className="input-label">備考</label>
                                <textarea className="form-input" rows="2" onChange={e=>setFormData({...formData, note: e.target.value})}></textarea>

                                <button onClick={handleSave} className="w-full bg-slate-800 text-white py-4 rounded-lg font-bold mt-6 shadow-xl active:scale-95 transition-transform">
                                    この内容で保存する
                                </button>
                            </div>
                        )}

                        {/* ③ 履歴タブ */}
                        {tab === '履歴' && (
                            <div className="overflow-x-auto">
                                <table className="w-full text-[10px] border-collapse bg-white">
                                    <thead>
                                        <tr className="bg-slate-100 text-slate-500 uppercase">
                                            <th className="border p-2">締め者</th><th className="border p-2">柄名</th><th className="border p-2">難易度</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {records.map(r => (
                                            <tr key={r.id} className="border-b">
                                                <td className="p-2 font-bold">{r.shime_name}</td>
                                                <td className="p-2">{r.gara_name}</td>
                                                <td className={`p-2 text-white text-center ${r.difficultyColor}`}>{r.difficulty}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {/* ④ 工賃計算タブ */}
                        {tab === '工賃計算' && (
                            <div className="bg-blue-50 p-6 rounded-xl border border-blue-200">
                                <h3 className="font-bold text-blue-900 mb-4 text-center">難易度別 平均工賃</h3>
                                {['低', '中', '高'].map(level => {
                                    const matching = records.filter(r => r.difficulty === level && r.wage);
                                    const avg = matching.length > 0 ? Math.round(matching.reduce((s, r) => s + Number(r.wage), 0) / matching.length) : 0;
                                    return (
                                        <div key={level} className="flex justify-between items-center py-2 border-b border-blue-100">
                                            <span className="font-bold text-slate-700">【{level}】</span>
                                            <span className="text-lg font-mono">¥ {avg.toLocaleString()}</span>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
